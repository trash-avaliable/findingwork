; save_modules.cfg — Enhanced Save System 模块注册配置文件
;
; 用途：
;   当 SaveSystem.use_module_config = true 时，系统将从此文件读取模块列表，
;   替代基于文件系统顺序的自动扫描（auto_register）。
;
; 字段说明：
;   path     (String,  必填) — 模块脚本的资源路径，必须是 ISaveModule 的子类
;   enabled  (bool,    可选) — 是否启用此模块，默认 true；设为 false 时跳过加载（不发出警告）
;   priority (int,     可选) — 加载优先级，数值越小越先执行 collect_data / apply_data，默认 100
;
; 示例：
;   [my_module]
;   path = "res://Scripts/SaveModules/my_module.gd"
;   enabled = true
;   priority = 10
;
; 注意：
;   - 节名（如 [settings_module]）仅用于标识，不影响功能
;   - priority 相同时，加载顺序由配置文件中的节顺序决定
;   - 路径不存在时会打印警告并跳过，不影响其他模块加载

; ──────────────────────────────────────────────
; 全局模块（写入 global.json）
; ──────────────────────────────────────────────

[settings_module]
path = "res://addons/enhance_save_system/Modules/settings_module.gd"
enabled = true
priority = 5

[keybinding_module]
path = "res://addons/enhance_save_system/Modules/keybinding_module.gd"
enabled = true
priority = 10

[stats_module]
path = "res://addons/enhance_save_system/Modules/stats_module.gd"
enabled = true
priority = 15

; ──────────────────────────────────────────────
; 槽位模块（写入 slot_XX.json）
; ──────────────────────────────────────────────

[player_module]
path = "res://addons/enhance_save_system/Modules/player_module.gd"
enabled = true
priority = 20

[level_module]
path = "res://addons/enhance_save_system/Modules/level_module.gd"
enabled = true
priority = 25

; ──────────────────────────────────────────────
; 自定义模块示例（默认禁用）
; ──────────────────────────────────────────────

; [my_custom_module]
; path = "res://Scripts/SaveModules/my_custom_module.gd"
; enabled = false
; priority = 50
